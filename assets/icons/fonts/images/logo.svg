<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">

  <!-- Left page — tapers toward bottom -->
  <path
    d="M32 10 L14 16 L18 54 L32 48 Z"
    fill="#c9a84c"
    opacity="0.75"
  />

  <!-- Right page — tapers toward bottom -->
  <path
    d="M32 10 L50 16 L46 54 L32 48 Z"
    fill="#c9a84c"
