  />

  <!-- Spine line -->
  <line
    x1="32" y1="10"
    x2="32" y2="48"
    stroke="#090909"
    stroke-width="1.5"
    stroke-linecap="round"
  />

  <!-- Top edge highlight -->
  <line
    x1="14" y1="16"
    x2="50" y2="16"
    stroke="#e8c96a"
    stroke-width="1"
    stroke-linecap="round"
    opacity="0.6"
  />

</svg>